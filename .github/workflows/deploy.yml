name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 每天 UTC 02:00 (北京时间 10:00) 抓取豆瓣数据并重新部署
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Douban data
        run: npx tsx scripts/fetch-douban.ts
        env:
          DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
        continue-on-error: true  # 豆瓣抓取失败不阻断构建

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
